                }

            // Cargar la primera pregunta (categorías principales)
            selectedQuestions = [
                { id: 1, text: "¿Qué tipo de solución de automatización de almacén está buscando?", 
                options: Object.keys(allQuestions), type: "radio" }
            ];
            loadQuestion(currentIndex);

            function validateForm() {
                const nombre = document.getElementById("nombre").value.trim();
                const email = document.getElementById("email").value.trim();
                const telefono = document.getElementById("telefono").value.trim();

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                const telefonoRegex = /^\d{10}$/;
                const nombreRegex = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$/;

                if (!nombre.match(nombreRegex)) {
                    alert("El nombre solo puede contener letras y espacios.");
                    return false;
                }
                if (!email.match(emailRegex)) {
                    alert("Ingrese un correo electrónico válido.");
                    return false;
                }
                if (telefono && !telefono.match(telefonoRegex)) {
                    alert("El número de teléfono debe contener exactamente 10 dígitos.");
                    return false;
                }
                return true;
            }

            function submitForm() {
                if (!validateForm()) return;

                const nombreUsuario = document.getElementById("nombre").value.trim();
                const form = document.createElement("form");
                form.action = "https://formsubmit.co/paola.munguia@tikendo.com.mx";  //Cambia por el correo destinatario
                form.method = "POST";

                // Encabezado personalizado
                const subjectInput = document.createElement("input");
                subjectInput.type = "hidden";
                subjectInput.name = "_subject";
                subjectInput.value = `Cotización de: ${nombreUsuario}`;
                form.appendChild(subjectInput);

                // Redirigir a la página de agradecimiento
                const nextInput = document.createElement("input");
                nextInput.type = "hidden";
                nextInput.name = "_next";
                nextInput.value = "http://localhost/Almacen/agradecimiento.html"; // Cambia por la URL real
                form.appendChild(nextInput);

                // Formato con guiones para preguntas y respuestas
                let emailContent = `Cotización de: ${nombreUsuario}\n\n`;
                selectedQuestions.forEach(q => {
                    let answerText = Array.isArray(q.answer) ? q.answer.join(", ") : q.answer;
                    emailContent += `- ${q.text}\n  → ${answerText}\n\n`;
                });

               // Capturar datos de contacto
                const nombre = document.getElementById("nombre").value.trim();
                const email = document.getElementById("email").value.trim();
                const telefono = document.getElementById("telefono").value.trim();
                const empresa = document.getElementById("empresa").value.trim();
                const comentarios = document.getElementById("comentarios").value.trim();

                emailContent += "Información de contacto:\n\n";
                emailContent += `- Nombre: ${nombre}\n`;
                emailContent += `- Correo Electrónico: ${email}\n`;
                emailContent += `- Teléfono: ${telefono}\n`;
                emailContent += `- Empresa: ${empresa}\n`;
                emailContent += `- Comentarios: ${comentarios}\n`;

                // Crear input oculto para enviar el contenido como texto simple
                const contentInput = document.createElement("input");
                contentInput.type = "hidden";
                contentInput.name = "message";
                contentInput.value = emailContent;
                form.appendChild(contentInput);

                // Agregar formulario al documento y enviarlo
                document.body.appendChild(form);
                form.submit();
            }
        </script>
        <!-- Sección de datos de contacto -->
        <div id="contact-info" style="margin-top: 20px; display: none;">
            <h3>Datos de Contacto</h3>
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" class="form-control" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" class="form-control" required>

            <label for="telefono">Teléfono (opcional):</label>
            <input type="tel" id="telefono" class="form-control">

            <label for="empresa">Empresa (opcional):</label>
            <input type="text" id="empresa" class="form-control">

            <label for="comentarios">Comentarios adicionales (opcional):</label>
            <textarea id="comentarios" class="form-control"></textarea>

            <button class="btn btn-success mt-3 align-self-end" onclick="submitForm()" style="font-size: 1.2rem; padding: 10px 20px;">Confirmar y Finalizar</button>
        </div>
    </section>
    
    
</body>
